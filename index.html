<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Apple Smart App Banner -->
  <meta name="apple-itunes-app" content="app-id=698255242">

  <title>Geometry Dash Lite</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .download-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 25px;
      background-color: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    .download-btn:hover {
      background-color: #00a844;
    }

    .game-preview {
      margin-top: 40px;
    }

    iframe {
      width: 90%;
      max-width: 600px;
      height: 300px;
      border: none;
      border-radius: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Geometry Dash Lite</h1>
    <p>Jump, fly, and flip your way through danger in this rhythm-based action platformer.</p>

    <a class="download-btn" href="https://apps.apple.com/app/id698255242">Download on the App Store</a>

    <div class="game-preview">
      <iframe src="https://www.youtube.com/embed/Hzl8sYfK9XQ" allowfullscreen></iframe>
    </div>
  </div>

</body>
</html>
